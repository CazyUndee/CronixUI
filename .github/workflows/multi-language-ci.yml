name: Multi-Language CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Python Package Tests
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        working-directory: packages/python
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          
      - name: Run tests
        working-directory: packages/python
        run: python -m pytest ../../tests/ -v --cov=cronixui --cov-report=xml --cov-report=html
          
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: packages/python/coverage
          files: ./coverage.xml

  # React Package Tests
  react-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        working-directory: packages/react
        run: |
          npm ci --legacy-peer-deps
          
      - name: Run tests
        working-directory: packages/react
        run: npm test --coverage
          
      - name: Build package
        working-directory: packages/react
        run: npm run build
        
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: packages/react/coverage

  # Go Package Tests
  go-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          
      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          
      - name: Download dependencies
        working-directory: packages/go/cronixui
        run: go mod download
        
      - name: Run tests
        working-directory: packages/go/cronixui
        run: go test -v ./...

  # Rust Package Tests
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          
      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Run tests
        working-directory: packages/rust/cronixui
        run: cargo test --verbose
        
      - name: Run clippy
        working-directory: packages/rust/cronixui
        run: cargo clippy -- -D warnings

  # Flutter Package Tests
  flutter-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          cache: true
          
      - name: Install dependencies
        working-directory: packages/flutter
        run: flutter pub get
        
      - name: Run tests
        working-directory: packages/flutter
        run: flutter test --coverage
        
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: packages/flutter/coverage

  # Web Package Tests
  web-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        working-directory: packages/web
        run: npm ci
        
      - name: Run tests (if available)
        working-directory: packages/web
        run: |
          if [ -f "test/*.js" ]; then
            npm test
          else
            echo "No test files found, skipping tests"
            
      - name: Build package
        working-directory: packages/web
        run: npm run build
        
      - name: Type check
        working-directory: packages/typescript
        run: npm run typecheck

  # TypeScript Package Tests
  typescript-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        working-directory: packages/typescript
        run: npm ci
        
      - name: Type check
        working-directory: packages/typescript
        run: npm run typecheck

  # Vue Package Tests (if exists)
  vue-tests:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('packages/vue/**') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        working-directory: packages/vue
        run: npm ci
        
      - name: Run tests
        working-directory: packages/vue
        run: npm test
        
      - name: Build package
        working-directory: packages/vue
        run: npm run build

  # Svelte Package Tests (if exists)
  svelte-tests:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('packages/svelte/**') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        working-directory: packages/svelte
        run: npm ci
        
      - name: Run tests
        working-directory: packages/svelte
        run: npm test
        
      - name: Build package
        working-directory: packages/svelte
        run: npm run build
